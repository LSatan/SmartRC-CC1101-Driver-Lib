name: Close Legacy Issues

on:
  # Erlaubt den manuellen Start ueber den "Actions" Tab
  workflow_dispatch:

jobs:
  close-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close all open issues with a legacy comment
        uses: actions/github-script@v7
        with:
          script: |
            const message = `Thank you for your feedback!\n\nAs of April 2026, this library has been completely refactored (V3.0.0). Because the core architecture has fundamentally changed to a new object-oriented model, we are closing all legacy issues to start fresh.\n\nPlease test your setup with the new version. If the issue persists, feel free to open a new report regarding V3.0.0.\n\nThanks for your understanding and years of support!`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            for (const issue of issues.data) {
              // Wir ueberspringen Pull Requests (die technisch auch Issues sind)
              if (issue.pull_request) continue;

              console.log(`Closing issue #${issue.number}`);

              // 1. Kommentar posten
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: message
              });

              // 2. Issue schliessen
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned' // Signalisiert, dass es ein Legacy-Schnitt ist
              });
            }