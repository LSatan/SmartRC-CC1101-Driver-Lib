name: Close Legacy Issues

on:
  workflow_dispatch:

jobs:
  close-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close legacy issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Holt ALLE Issues (auch wenn es mehrere Seiten sind)
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            const message = `Thank you for your feedback!\n\nAs of April 2026, this library has been completely refactored (V3.0.0). Because the core architecture has fundamentally changed to a new object-oriented model, we are closing all legacy issues to start fresh.\n\nPlease test your setup with the new version. If the issue persists, feel free to open a new report regarding V3.0.0.\n\nThanks for your understanding and years of support!`;

            if (!issues || issues.length === 0) {
              console.log('Keine weiteren offenen Issues gefunden.');
              return;
            }

            console.log(`Starte das Schließen von ${issues.length} Issues...`);

            for (const issue of issues) {
              if (issue.pull_request) continue;
              
              console.log('Closing issue #' + issue.number);
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: message
              });
              
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }
            console.log('Alle Issues erfolgreich bearbeitet!');
